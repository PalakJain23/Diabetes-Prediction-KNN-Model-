<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Diabetes Prediction</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<div class="wrapper">
    <div class="card">
        <h2 class="title">Diabetes Prediction</h2>
        <p class="subtitle">Enter patient details below</p>

        <form action="/predict" method="POST">

            <div class="grid">
                <input type="number" step="any" name="pregnancies" placeholder="Pregnancies" required>
                <input type="number" step="any" name="glucose" placeholder="Glucose Level" required>
                <input type="number" step="any" name="bloodpressure" placeholder="Blood Pressure" required>
                <input type="number" step="any" name="skin" placeholder="Skin Thickness" required>
                <input type="number" step="any" name="insulin" placeholder="Insulin Level" required>
                <input type="number" step="any" name="bmi" placeholder="BMI" required>
                <input type="number" step="any" name="dpf" placeholder="Diabetes Pedigree Function" required>
                <input type="number" step="any" name="age" placeholder="Age" required>
            </div>

            <button class="btn" type="submit">Predict</button>

        </form>

        {% if prediction_text %}
            <div class="result">{{ prediction_text }}</div>
        {% endif %}
    </div>
</div>

</body>
</html>
